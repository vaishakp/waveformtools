name: Publish to PyPI

on:
  release:
    types:
      - published
  push:
    branches:
      - main
    paths:
      - waveformtools/__init__.py
      - pyproject.toml
      - setup.py
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check-version:
    name: Check PyPI version
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check whether package version is new
        id: version
        run: |
          python - <<'PY'
          import ast
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          package = "waveformtools"
          version_path = Path("waveformtools/__init__.py")
          module = ast.parse(version_path.read_text(encoding="utf-8"))

          version = None
          for node in module.body:
              if not isinstance(node, ast.Assign):
                  continue
              for target in node.targets:
                  if isinstance(target, ast.Name) and target.id == "__version__":
                      version = ast.literal_eval(node.value)
                      break

          if not isinstance(version, str) or not version.strip():
              raise RuntimeError("Could not read a non-empty __version__ string")

          quoted_version = urllib.parse.quote(version, safe="")
          url = f"https://pypi.org/pypi/{package}/{quoted_version}/json"
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  version_exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  version_exists = False
              else:
                  raise

          should_publish = "false" if version_exists else "true"
          if version_exists:
              print(f"{package} {version} already exists on PyPI; skipping publish.")
          else:
              print(f"{package} {version} is not on PyPI; build and publish may proceed.")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={version}", file=output)
              print(f"should_publish={should_publish}", file=output)
          PY

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build source and wheel distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distributions to PyPI
    needs:
      - check-version
      - build
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/waveformtools/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
