[tool.black]
line-length = 125

[tool.isort]
profile = "black"

[tool.pylint.'MESSAGES CONTROL']
max-line-length = 125
disable= "W0311"

[tool.flake8]
max-line-length = 125
ignore = ['E203']

[build-system]
requires = ["hatching"]
build-backend = "hatching.build"

[project]
name = "waveformtools"
version = "2023.05.06"
authors = [{ name="Vaishak Prasad", email="vaishakprasad@gmail.com"}, ]
description = " Tools for working with numerical relativity and waveforms data "
readme = "README.md"
requires-python = ">=3.0"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
[project.urls]
"Homepage" = "https://gitlab.com/vaishakp/waveformtools"
"Bug Tracker" = "https://gitlab.com/vaishakp/waveformtools/issues"
